<!DOCTYPE html>
<html lang="en">
<head>
    
</head>
<body>
    <button onclick="displayEvenNumbers()">Display Even Numbers (1-20)</button>
    
    <script>
        let a = 8;
        if(a <8){
            console.log("a is less than 8");
        } else if(a > 8){
            console.log("a is greater than 8");
        } else {
            console.log("a is equal to 8");
        }

        let b = 10;
        if(b < 10){
            document.write("b is less than 10");
        } else if(b > 10){      
            document.write("b is greater than 10");
        } else {
            document.write("b is equal to 10");
        }

        function displayEvenNumbers() {
            for(let i = 1; i <= 20; i++) {
                if(i % 2 === 0) {
                    console.log(i);
                }
            }
        }
    </script>
    
</body>
</html>
