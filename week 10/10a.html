<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   

<script>
    function findSign(a, b, c) {
        let product = a * b * c;
        let message;

        if (product > 0) {
            message = "The product is " + product + " and the sign is positive (+)";
        } 
        else if (product < 0) {
            message = "The product is " + product + " and the sign is negative (-)";
        } 
        else {
            message = "The product is " + product + " (zero)";
        }

        return message;
    }

    let num1 = Number(prompt("Enter first number:"));
    let num2 = Number(prompt("Enter second number:"));
    let num3 = Number(prompt("Enter third number:"));

    alert(findSign(num1, num2, num3));
</script>
</body>
</html>
