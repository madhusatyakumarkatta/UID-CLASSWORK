<!DOCTYPE html>
<html>
<head>
    <title>User Login & Registration</title>
    <style></style>
</head>

<body style="margin:0; font-family:Arial;">

<div style="display:flex; height:100vh;">

    <!-- Login Section -->
    <div style="width:50%; padding:40px; box-sizing:border-box; border-right:2px solid black;">
        
        <h2 style="text-align:center;">User Login</h2>
    <form>
        <table style="width:100%" border="1" cellpadding="10" cellspacing="0" align="center">
            <tr>
            <td>
        <label>Username:</label></td>
        <td><input type="text" name="username"></td>
        </tr>
        <tr>
            <td>
        <label>Password:</label></td>
        <td><input type="password" name="password"></td>
        </tr>
        </td>
    <tr>
    <td align="center" colspan="12">
        <input type="submit" value="Login">
    </td>
    </tr>
        </table>
    </form>
    </div>


    <!-- Registration Section -->
    <div style="width:50%; padding:40px; box-sizing:border-box;">
        
        <h2 style="text-align:center;">User Registration</h2>

        <form>
        <table style="width:100%" border="1" cellpadding="10" cellspacing="0" align="center">
        <tr>
            <td><label>Full Name:</label><br></td>
        <td><input type="text" name="fullname"><br><br></td>
        </tr>
        <tr>
        <td><label>Email:</label><br></td>
        <td><input type="email" name="email"></td>
        </tr>
        <tr>
        <td><label>Phone:</label><br></td>
        <td><input type="text" name="phone"></td>
        </tr>
        <tr>
        <td><label>Password:</label></td>
        <td><input type="password" name="password"></td>
        </tr>
        <tr>
        <td colspan="12" align="center"><input type="submit" value="Register"><input type="reset" value="Reset"></td>
        </tr>
    </table>
    </form>

    </div>

</div>

</body>
</html>
</html>
