<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f8f8;
            margin: 0;
        }

        .menu-container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        .section {
            margin-bottom: 25px;
        }

        .section h2 {
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
        }

        .item-name {
            font-weight: bold;
        }

        .price {
            color: #007bff;
        }
    </style>
</head>

<body>
    <p> madhu satya kumar ,cse25118</p>

    <div class="menu-container">
        <h1> Maves Menu</h1>

        <!-- Starters -->
        <div class="section">
            <h2> Starters</h2>

            <div class="item">
                <span class="item-name">Spring Rolls</span>
                <span class="price">₹120</span>
            </div>

            <div class="item">
                <span class="item-name">Paneer Tikka</span>
                <span class="price">₹180</span>
            </div>
        </div>

        <!-- Main Course -->
        <div class="section">
            <h2> Main Course</h2>

            <div class="item">
                <span class="item-name">Butter Chicken</span>
                <span class="price">₹320</span>
            </div>

            <div class="item">
                <span class="item-name">Veg Biryani</span>
                <span class="price">₹250</span>
            </div>
        </div>

        <!-- Desserts -->
        <div class="section">
            <h2> Desserts</h2>

            <div class="item">
                <span class="item-name">Gulab Jamun</span>
                <span class="price">₹90</span>
            </div>

            <div class="item">
                <span class="item-name">Ice Cream</span>
                <span class="price">₹100</span>
            </div>
        </div>

        <!-- Drinks -->
        <div class="section">
            <h2> Beverages</h2>

            <div class="item">
                <span class="item-name">Cold Coffee</span>
                <span class="price">₹150</span>
            </div>

            <div class="item">
                <span class="item-name">Fresh Lime Soda</span>
                <span class="price">₹80</span>
            </div>
        </div>

    </div>

</body>
</html>
